<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formular instituție</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #B99B64;
  --gold-light: #f2ebdb;
  --gold-dark: #9e8553;

  --green: #004A41;
  --green-light: #e0f2ef;
  --green-dark: #003830;

  --gray-100: #f7f7f5;
  --gray-200: #ebebea;
  --gray-400: #9b9a95;
  --gray-700: #3d3d3a;
  --gray-900: #1a1a18;

  --red: #c0392b;
  --radius: 10px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  min-height: 100vh;
}

header {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 20px 24px;
  display: flex;
  gap: 16px;
}

.logo-placeholder {
  width: 48px; height: 48px;
  border: 1.5px dashed var(--gray-400);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

header h1 {
  font-family: 'DM Serif Display';
  font-size: 20px;
}

.steps {
  display: flex;
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 24px;
}

.step-btn {
  padding: 14px 20px;
  font-size: 13px;
  color: var(--gray-400);
  border-bottom: 2px solid transparent;
  cursor: pointer;
}

.step-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.step-btn.done {
  color: var(--green);
}

.step-btn.active .step-num {
  background: var(--gold);
  color: #fff;
}

.step-btn.done .step-num {
  background: var(--green);
  color: #fff;
}

.step-num {
  display: inline-flex;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--gray-200);
  justify-content: center; align-items: center;
  font-size: 11px;
  margin-right: 8px;
}

.container { max-width: 680px; margin: auto; padding: 30px; }

.card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}

label { font-size: 13px; margin-bottom: 8px; display: block; }

input, select, textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(185,155,100,0.15);
}

.rating-btn {
  width: 44px; height: 44px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  cursor: pointer;
}

.rating-btn:hover { border-color: var(--gold); color: var(--gold); }

.rating-btn.selected {
  background: var(--gold);
  color: #fff;
}

.radio-option {
  border: 1px solid var(--gray-200);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
}

.radio-option:hover {
  border-color: var(--gold);
  background: var(--gold-light);
}

.radio-option.selected {
  border-color: var(--gold);
  background: var(--gold-light);
  color: var(--gold);
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-primary {
  background: var(--green);
  color: #fff;
}

.btn-primary:hover {
  background: var(--green-dark);
}

.btn-secondary {
  border: 1px solid var(--gray-200);
  background: #fff;
}

.cal-day:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.cal-day.selected {
  background: var(--gold);
  color: #fff;
}

.slot-btn.selected {
  background: var(--gold);
  color: #fff;
}

.progress-fill {
  background: var(--gold);
  height: 3px;
}

</style>
</head>

<body>

<header>
  <div class="logo-placeholder">Logo</div>
  <div>
    <h1>Denumire instituție</h1>
    <p>Formular online</p>
  </div>
</header>

<div class="progress-fill" style="width:25%"></div>

<div class="steps">
  <button class="step-btn active"><span class="step-num">1</span>Satisfacție</button>
  <button class="step-btn"><span class="step-num">2</span>Inserție</button>
  <button class="step-btn"><span class="step-num">3</span>GDPR</button>
  <button class="step-btn"><span class="step-num">4</span>Programare</button>
</div>

<div class="container">

<div class="card">
<label>Evaluare</label>
<div>
<button class="rating-btn">1</button>
<button class="rating-btn">2</button>
<button class="rating-btn">3</button>
<button class="rating-btn">4</button>
<button class="rating-btn">5</button>
</div>
</div>

<div class="card">
<label>Nume</label>
<input type="text">
</div>

<button class="btn btn-primary">Trimite</button>

</div>

</body>
</html>
